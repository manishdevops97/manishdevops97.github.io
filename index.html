<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Training Report</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  width: 360px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

h3 {
  text-align: center;
  margin-bottom: 15px;
}

input, textarea, select, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

input[readonly] {
  background-color: #f1f1f1;
  font-weight: bold;
}

button {
  background: #667eea;
  color: white;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #5a67d8;
}

button:disabled {
  background: #999;
  cursor: not-allowed;
}

.status {
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
<h3>📋 Daily Training Report</h3>

<form id="reportForm">

<input type="text" id="name" value="Manish Kumar" readonly />
<input type="date" id="date" required />
<input type="text" id="course" value="DevOps Engineer" readonly />

<select id="taskStatus" required>
  <option value="">Select Task Status</option>
  <option value="Pending">Pending</option>
  <option value="Finished">Finished</option>
</select>

<textarea id="pendingMsg" placeholder="Pending Task Details"></textarea>
<textarea id="finishedMsg" placeholder="Finished Task Details"></textarea>

<button type="submit" id="submitBtn">Submit Report</button>

</form>

<div class="status" id="status"></div>
</div>

<script>
const form = document.getElementById("reportForm");
const statusDiv = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    name: document.getElementById("name").value,
    const rawDate = document.getElementById("date").value;

function formatDateDDMMYYYY(dateStr) {
  const [year, month, day] = dateStr.split("-");
  return `${day}-${month}-${year}`;
}

const formattedDate = formatDateDDMMYYYY(rawDate);
    course: document.getElementById("course").value,
    status: document.getElementById("taskStatus").value,
    pendingMsg: document.getElementById("pendingMsg").value,
    finishedMsg: document.getElementById("finishedMsg").value
  };

  if (!payload.date || !payload.status) {
    statusDiv.innerText = "❌ Please fill required fields";
    return;
  }

  statusDiv.innerText = "Sending...";
  submitBtn.disabled = true;

  try {
    const res = await fetch("https://crmmyuismcfhghie7q6ymcsj7u0gqmbq.lambda-url.ap-south-1.on.aws/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (res.ok) {
      statusDiv.innerText = "✅ Report Sent Successfully";
      form.reset();
    } else {
      statusDiv.innerText = "❌ " + (data.error || "Error");
    }

  } catch (error) {
    console.error(error);
    statusDiv.innerText = "❌ Network Error";
  }

  submitBtn.disabled = false;
});
</script>

</body>
</html>
